# ============================================================================
#  Voice Magic — Configuration
# ============================================================================

# ── 1. Speech-to-Text Engine ─────────────────────────────────────────────────
# The STT engine to use for converting your voice into raw text.
# 'whisper'   - OpenAI Whisper via whisper.cpp (default, supports translation)
# 'parakeet'  - NVIDIA Parakeet via parakeet-mlx (faster, higher English accuracy)
STT_ENGINE="parakeet"

# ── 2. Language & Dictation ──────────────────────────────────────────────────
# The language to dictate in. 
# Defaults to 'auto' to automatically detect the language (English, Hindi, etc.)
# If you dictate predominantly in one language, set it to the language code 
# to improve accuracy and speed: e.g. 'en', 'hi', 'es'
# Note: Parakeet supports 17 languages but does NOT support translation.
LANGUAGE="auto"

# Set to 'true' to seamlessly translate all spoken languages (e.g., Hindi)
# into beautifully polished English text before pasting.
# Note: Only works with Whisper engine. For Parakeet, use the LLM fallback.
TRANSLATE_TO_ENGLISH="true"

# ── 3. Artificial Intelligence ───────────────────────────────────────────────
# The AI Model to use for text refinement and code generation.
# 'llama3'      - 3B Instruct, General purpose text refinement (Default)
# 'deepseek'    - 1.3B Coder, Excellent formatting and terminal capability
# 'qwencoder'   - 1.5B Coder, Rapid code completion logic
ACTIVE_MODEL="llama3"

# ── 4. Performance & Processing ──────────────────────────────────────────────
# Disable LLM processing entirely. This will bypass the AI refinement step and
# paste the raw transcribed text directly at light-speed.
SKIP_LLM_PROCESSING="false"
